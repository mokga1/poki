<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>놀이터 🎀</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #ffe3f1 0%, #e7ecff 60%, #fff6e0 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    h1 {
      font-size: 56px; margin: 0 0 8px; color: #e0408a;
      text-shadow: 3px 3px 0 #fff, -2px -2px 0 #fff;
    }
    .subtitle { color: #8a6aa0; font-size: 20px; margin: 0 0 40px; }
    .games { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .game-card {
      width: 300px; height: 360px; border-radius: 28px;
      background: #fff; text-decoration: none; color: inherit;
      box-shadow: 0 10px 30px rgba(150, 90, 160, 0.25);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; transition: transform .15s ease, box-shadow .15s ease;
      border: 4px solid transparent;
    }
    .game-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 18px 40px rgba(150, 90, 160, 0.35);
    }
    .game-card.runner:hover { border-color: #7fd4ff; }
    .game-card.cinderella:hover { border-color: #f4a9c8; }
    .emoji { font-size: 110px; line-height: 1; filter: drop-shadow(0 6px 8px rgba(0,0,0,.12)); }
    .game-title { font-size: 30px; font-weight: bold; }
    .game-desc { font-size: 16px; color: #9a7aab; padding: 0 20px; text-align: center; }
    footer { margin-top: 40px; color: #b79ac6; font-size: 14px; }
  </style>
</head>
<body>
  <h1>놀이터 🎀</h1>
  <p class="subtitle">어떤 놀이를 할까요?</p>
  <div class="games">
    <a class="game-card runner" href="games/runner/index.html">
      <div class="emoji">🌈</div>
      <div class="game-title">포키 달리기</div>
      <div class="game-desc">장애물을 피하며 멀리 달려요!</div>
    </a>
    <a class="game-card cinderella" href="games/cinderella/index.html">
      <div class="emoji">👗</div>
      <div class="game-title">신데렐라 꾸미기</div>
      <div class="game-desc">예쁘게 꾸미고 무도회에 가요!</div>
    </a>
  </div>
  <footer>♡ 아빠가 만든 게임 ♡</footer>
</body>
</html>
