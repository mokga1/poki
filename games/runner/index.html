<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>포키</title>
  <style>
    html, body { touch-action: none; overscroll-behavior: none; }
    body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
    canvas { display: block; }
    #score {
      position: absolute; top: 20px; left: 20px;
      font-size: 32px; font-weight: bold; color: #e0408a;
      text-shadow: 2px 2px 0 white, -2px -2px 0 white, 2px -2px 0 white, -2px 2px 0 white;
      z-index: 10;
    }
    #gameover {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); color: white;
      display: none; flex-direction: column; justify-content: center; align-items: center;
      font-size: 28px; z-index: 20;
    }
    #gameover.show { display: flex; }
    #gameover h1 { font-size: 64px; margin: 0 0 20px; }
    #gameover .hint { font-size: 20px; margin-top: 30px; opacity: 0.8; }
    #startscreen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 30;
    }
    #startscreen.hide { display: none; }
    #startscreen h1 {
      font-size: 80px; margin: 0 0 24px; color: #e0408a;
      text-shadow: 3px 3px 0 white, -3px -3px 0 white, 3px -3px 0 white, -3px 3px 0 white;
    }
    #startscreen .card {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 20px; padding: 24px 40px;
      font-size: 22px; color: #6a4a7a; line-height: 1.9; text-align: center;
      box-shadow: 0 6px 20px rgba(224, 64, 138, 0.25);
    }
    #startscreen .start-hint {
      margin-top: 28px; font-size: 26px; font-weight: bold; color: #e0408a;
      text-shadow: 2px 2px 0 white, -2px -2px 0 white, 2px -2px 0 white, -2px 2px 0 white;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
    }
    /* 폰처럼 좁은 화면에서는 글씨와 여백을 줄여서 안 깨지게 */
    @media (max-width: 480px) {
      #score { font-size: 26px; }
      #startscreen h1 { font-size: 52px; margin-bottom: 16px; }
      #startscreen .card { font-size: 15px; padding: 14px 18px; line-height: 1.8; max-width: 80vw; }
      #startscreen .start-hint { font-size: 18px; margin-top: 20px; padding: 0 12px; text-align: center; }
      #gameover { font-size: 22px; }
      #gameover h1 { font-size: 44px; }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="score">0</div>
  <div id="startscreen">
    <h1>포키 🌈</h1>
    <div class="card">
      ← → &nbsp;차선 이동<br>
      ↑ &nbsp;점프 &nbsp;&nbsp; ↓ &nbsp;슬라이드<br>
      M &nbsp;소리 켜기/끄기<br>
      📱 폰: 밀기로 이동·점프·슬라이드
    </div>
    <div class="start-hint">스페이스 키 또는 화면 터치로 시작!</div>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div id="final-score">점수: 0</div>
    <div id="high-score">최고 점수: 0</div>
    <div class="hint">R 키 또는 화면 터치로 다시 시작</div>
  </div>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
